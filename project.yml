name: Sodalite
options:
  bundleIdPrefix: de.superuser404
  deploymentTarget:
    tvOS: "26.0"
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 4NY63S72W9
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_EMIT_LOC_STRINGS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DISABLE_DIAMOND_PROBLEM_DIAGNOSTIC: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    GCC_C_LANGUAGE_STANDARD: gnu17
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  configs:
    Release:
      VALIDATE_PRODUCT: YES
settingGroups:
  app:
    INFOPLIST_FILE: SupportingFiles/Info.plist
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.entertainment
    PRODUCT_BUNDLE_IDENTIFIER: de.superuser404.Sodalite
    PRODUCT_NAME: Sodalite
    CODE_SIGN_ENTITLEMENTS: SupportingFiles/Sodalite.entitlements
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
packages:
  AetherEngine:
    url: https://github.com/superuser404notfound/AetherEngine
    revision: d714488367c6bbb8b677a16b36131e57208f5a6d
  SwiftAssRenderer:
    url: https://github.com/mihai8804858/swift-ass-renderer
    version: 1.3.1
targets:
  Sodalite-tvOS:
    type: application
    platform: tvOS
    sources:
      - path: Sodalite
        excludes:
          - "Platforms/iOS/**"
    settings:
      groups:
        - app
      base:
        TARGETED_DEVICE_FAMILY: "3"
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        ASSETCATALOG_COMPILER_BRAND_ASSETS_NAME: "App Icon & Top Shelf Image"
        # PiP: without the audio background mode tvOS kills the app's audio session on backgrounding and
        # the system pauses playback the moment the user leaves the app, even with a live PiP window.
        INFOPLIST_KEY_UIBackgroundModes: audio
      configs:
        Debug:
          ENABLE_PREVIEWS: YES
        Release:
          ENABLE_PREVIEWS: NO
          ENABLE_XOJIT_PREVIEWS: NO
          ENABLE_DEBUG_DYLIB: NO
    dependencies:
      - package: AetherEngine
      - package: SwiftAssRenderer
      - target: SodaliteTopShelf
  Sodalite-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sodalite
        excludes:
          - "Platforms/tvOS/**"
    settings:
      groups:
        - app
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
        INFOPLIST_KEY_UIBackgroundModes: remote-notification
      configs:
        Debug:
          ENABLE_PREVIEWS: YES
        Release:
          ENABLE_PREVIEWS: NO
          ENABLE_XOJIT_PREVIEWS: NO
          ENABLE_DEBUG_DYLIB: NO
    dependencies:
      - package: AetherEngine
      - package: SwiftAssRenderer
  SodaliteTopShelf:
    type: com.apple.product-type.tv-app-extension
    platform: tvOS
    sources:
      - path: SodaliteTopShelf
    settings:
      base:
        INFOPLIST_FILE: SupportingFiles/SodaliteTopShelf-Info.plist
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_OUTPUT_FORMAT: binary
        PRODUCT_BUNDLE_IDENTIFIER: de.superuser404.Sodalite.TopShelf
        PRODUCT_NAME: SodaliteTopShelf
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/SodaliteTopShelf.entitlements
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        LM_SKIP_METADATA_EXTRACTION: YES
        OTHER_LDFLAGS: -e _NSExtensionMain
        TARGETED_DEVICE_FAMILY: "3"
  SodaliteTests:
    type: bundle.unit-test
    platform: tvOS
    sources:
      - path: SodaliteTests
    settings:
      base:
        PRODUCT_NAME: SodaliteTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: NO
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Sodalite.app/Sodalite
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: Sodalite-tvOS
schemes:
  Sodalite-tvOS:
    build:
      targets:
        Sodalite-tvOS: all
    test:
      targets:
        - SodaliteTests
  Sodalite-iOS:
    build:
      targets:
        Sodalite-iOS: all
